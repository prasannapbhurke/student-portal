{% extends 'dashboard/base.html' %}
{% load static %}
{% block content %}

<div class="container mt-4 study-tool-page">
    <h2>Flashcards</h2>
    <p class="search-page-copy">Create a quick revision deck by entering one card per line in the format <strong>term = answer</strong>.</p>

    <div class="row">
        <div class="col-lg-5 mb-4">
            <div class="card">
                <div class="card-body">
                    <label for="flashcard-input"><strong>Deck Builder</strong></label>
                    <textarea id="flashcard-input" class="form-control mb-3">Photosynthesis = Process plants use to convert light into energy
Mitochondria = The powerhouse of the cell
HTTP = Protocol used to transfer web pages</textarea>
                    <button type="button" class="btn btn-primary" id="load-flashcards">Load Deck</button>
                </div>
            </div>
        </div>
        <div class="col-lg-7 mb-4">
            <div class="card flashcard-stage">
                <div class="card-body">
                    <div class="flashcard-meta">
                        <span id="flashcard-position">Card 1 of 1</span>
                        <button type="button" class="btn btn-outline-secondary btn-sm" id="flip-card">Flip</button>
                    </div>
                    <button type="button" class="flashcard-display" id="flashcard-display">
                        <span id="flashcard-side-label">Front</span>
                        <h3 id="flashcard-text">Photosynthesis</h3>
                    </button>
                    <div class="flashcard-actions">
                        <button type="button" class="btn btn-outline-primary" id="prev-card">Previous</button>
                        <button type="button" class="btn btn-primary" id="next-card">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('flashcard-input');
    const loadButton = document.getElementById('load-flashcards');
    const display = document.getElementById('flashcard-display');
    const text = document.getElementById('flashcard-text');
    const sideLabel = document.getElementById('flashcard-side-label');
    const position = document.getElementById('flashcard-position');
    const flipButton = document.getElementById('flip-card');
    const prevButton = document.getElementById('prev-card');
    const nextButton = document.getElementById('next-card');

    let cards = [];
    let currentIndex = 0;
    let showingBack = false;

    function parseCards() {
        cards = input.value
            .split('\n')
            .map((line) => line.split('='))
            .filter((parts) => parts.length >= 2)
            .map((parts) => ({
                front: parts[0].trim(),
                back: parts.slice(1).join('=').trim(),
            }))
            .filter((card) => card.front && card.back);

        if (!cards.length) {
            cards = [{ front: 'No cards loaded', back: 'Add lines using term = answer' }];
        }

        currentIndex = 0;
        showingBack = false;
        renderCard();
    }

    function renderCard() {
        const card = cards[currentIndex];
        sideLabel.textContent = showingBack ? 'Back' : 'Front';
        text.textContent = showingBack ? card.back : card.front;
        position.textContent = `Card ${currentIndex + 1} of ${cards.length}`;
    }

    loadButton.addEventListener('click', parseCards);
    flipButton.addEventListener('click', function() {
        showingBack = !showingBack;
        renderCard();
    });
    display.addEventListener('click', function() {
        showingBack = !showingBack;
        renderCard();
    });
    prevButton.addEventListener('click', function() {
        currentIndex = (currentIndex - 1 + cards.length) % cards.length;
        showingBack = false;
        renderCard();
    });
    nextButton.addEventListener('click', function() {
        currentIndex = (currentIndex + 1) % cards.length;
        showingBack = false;
        renderCard();
    });

    parseCards();
});
</script>

{% endblock %}
