{% extends 'dashboard/base.html' %}
{% load static %}
{% load crispy_forms_tags %}
{% block content %}

<div class="container">
    <h2 class="mt-4">Edit Homework</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-success">Update Homework</button>
        <a href="{% url 'homework' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
