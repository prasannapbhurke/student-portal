{% extends 'dashboard/base.html' %}
{% load static %}
{% block content %}

<div class="container">
    <h2 class="mt-4">Edit Homework</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" class="form-control" id="title" name="title" value="{{ homework.title }}" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea class="form-control" id="description" name="description" rows="3">{{ homework.description }}</textarea>
        </div>
        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" class="form-control" id="subject" name="subject" value="{{ homework.subject }}">
        </div>
        <div class="form-group">
            <label for="deadline">Deadline</label>
            <input type="datetime-local" class="form-control" id="deadline" name="deadline" value="{{ homework.deadline|date:'Y-m-d\TH:i' }}" required>
        </div>
        <button type="submit" class="btn btn-success">Update Homework</button>
        <a href="{% url 'homework' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
