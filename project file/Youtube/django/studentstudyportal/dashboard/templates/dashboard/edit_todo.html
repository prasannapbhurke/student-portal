{% extends 'dashboard/base.html' %}
{% load static %}
{% block content %}

<div class="container">
    <h2 class="mt-4">Edit Todo</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" class="form-control" id="title" name="title" value="{{ todo.title }}" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea class="form-control" id="description" name="description" rows="3">{{ todo.description }}</textarea>
        </div>
        <div class="form-group">
            <label for="priority">Priority</label>
            <select class="form-control" id="priority" name="priority">
                <option value="low" {% if todo.priority == 'low' %}selected{% endif %}>Low</option>
                <option value="medium" {% if todo.priority == 'medium' %}selected{% endif %}>Medium</option>
                <option value="high" {% if todo.priority == 'high' %}selected{% endif %}>High</option>
            </select>
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <select class="form-control" id="category" name="category">
                <option value="personal" {% if todo.category == 'personal' %}selected{% endif %}>Personal</option>
                <option value="work" {% if todo.category == 'work' %}selected{% endif %}>Work</option>
                <option value="study" {% if todo.category == 'study' %}selected{% endif %}>Study</option>
                <option value="health" {% if todo.category == 'health' %}selected{% endif %}>Health</option>
                <option value="other" {% if todo.category == 'other' %}selected{% endif %}>Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="progress">Progress (%)</label>
            <input type="number" class="form-control" id="progress" name="progress" min="0" max="100" value="{{ todo.progress }}">
        </div>
        <div class="form-group">
            <label for="due_date">Due Date</label>
            <input type="date" class="form-control" id="due_date" name="due_date" value="{{ todo.due_date|date:'Y-m-d' }}">
        </div>
        <button type="submit" class="btn btn-success">Update Todo</button>
        <a href="{% url 'todo' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
